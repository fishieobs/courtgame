<title>逆轉律師 — 台灣法庭推理</title>
<style>
:root{
  --ink:#15100c; --wood:#6f4526; --wood2:#8a5a33; --gold:#d9a441; --gold2:#f0c469;
  --paper:#f6ecd4; --paper2:#eaddc0; --defense:#2e6fd8; --pros:#b8322a;
  --testi:#7ee08a; --think:#8fc7ff; --sys:#ffd479;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#000;}
body{
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  color:var(--paper); user-select:none; -webkit-user-select:none; touch-action:manipulation;
}
button{font-family:inherit;border:none;cursor:pointer;}
#app{position:fixed;inset:0;max-width:560px;margin:0 auto;background:var(--ink);
  display:flex;flex-direction:column;overflow:hidden;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}

/* ---------- screens ---------- */
.screen{position:absolute;inset:0;display:none;flex-direction:column;}
.screen.on{display:flex;}

/* ---------- title ---------- */
#scr-title{background:
  radial-gradient(120% 70% at 50% 0%, #2a2017 0%, #15100c 60%),
  var(--ink); align-items:center;justify-content:center;text-align:center;gap:18px;}
#scr-title .scale{font-size:64px;filter:drop-shadow(0 6px 14px rgba(217,164,65,.35));animation:bob 3s ease-in-out infinite;}
#scr-title h1{font-size:54px;font-weight:900;letter-spacing:10px;color:var(--gold2);
  text-shadow:0 3px 0 #7a5a1d,0 8px 24px rgba(0,0,0,.6);margin-left:10px;}
#scr-title .sub{font-size:15px;letter-spacing:8px;color:var(--paper2);opacity:.85;margin-left:8px;}
#scr-title .rule{width:180px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.menu-btn{display:block;width:240px;padding:14px 0;margin:6px auto;border-radius:6px;
  background:linear-gradient(180deg,var(--wood2),var(--wood));color:var(--paper);
  font-size:18px;font-weight:700;letter-spacing:6px;border:1px solid #3a2412;
  box-shadow:0 4px 0 #3a2412,0 8px 16px rgba(0,0,0,.4);}
.menu-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #3a2412;}
.tiny{font-size:11px;color:#9c8c70;letter-spacing:2px;}

/* ---------- case select ---------- */
#scr-select{background:var(--ink);padding:18px 16px;gap:12px;overflow-y:auto;}
#scr-select h2{font-size:20px;letter-spacing:6px;color:var(--gold2);text-align:center;padding:8px 0 4px;}
.case-card{position:relative;border:1px solid #4a3520;border-radius:10px;padding:14px 16px;
  background:linear-gradient(135deg,#241a11,#1a130c);text-align:left;color:var(--paper);width:100%;}
.case-card .ep{font-size:11px;letter-spacing:3px;color:var(--gold);}
.case-card h3{font-size:19px;font-weight:900;letter-spacing:2px;margin:4px 0 6px;}
.case-card p{font-size:12.5px;line-height:1.7;color:#cdbfa4;}
.case-card .stars{position:absolute;top:12px;right:14px;font-size:13px;color:var(--gold2);}
.case-card.locked{opacity:.45;filter:grayscale(.6);}
.case-card.locked h3::after{content:"　🔒";}
.case-card .done-badge{display:inline-block;margin-top:8px;font-size:11px;color:var(--testi);letter-spacing:2px;}
.back-btn{align-self:center;margin-top:4px;background:none;color:#9c8c70;font-size:13px;letter-spacing:3px;padding:10px;}

/* ---------- game ---------- */
#scr-game{background:var(--ink);}
#hud{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;gap:8px;z-index:30;}
.hud-btn{background:rgba(0,0,0,.45);border:1px solid #5a472c;color:var(--gold2);
  border-radius:6px;padding:7px 12px;font-size:13px;font-weight:700;letter-spacing:1px;}
#penalty{display:flex;gap:3px;font-size:15px;filter:drop-shadow(0 1px 2px #000);}
#penalty .p{transition:opacity .3s;}
#penalty .p.lost{opacity:.18;filter:grayscale(1);}

#scene{position:relative;flex:1;overflow:hidden;}
#bg{position:absolute;inset:0;}
#sprite{position:absolute;left:50%;bottom:-4px;transform:translateX(-50%);
  width:min(76vw,340px);transition:opacity .18s;}
#sprite svg{width:100%;height:auto;display:block;filter:drop-shadow(0 8px 18px rgba(0,0,0,.55));}
#sprite.bob{animation:bob 3.2s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}
#sprite .mouth-open{opacity:0;}
#sprite.talking .mouth-open{animation:talk .26s steps(2) infinite;}
#sprite.talking .mouth-closed{animation:talkc .26s steps(2) infinite;}
@keyframes talk{0%,100%{opacity:0}50%{opacity:1}}
@keyframes talkc{0%,100%{opacity:1}50%{opacity:0}}

.shake{animation:shake .42s;}
@keyframes shake{0%,100%{transform:translate(0,0)}15%{transform:translate(-9px,4px)}30%{transform:translate(8px,-5px)}45%{transform:translate(-7px,-3px)}60%{transform:translate(6px,4px)}75%{transform:translate(-4px,2px)}90%{transform:translate(3px,-2px)}}

#fx-flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:40;}
#fx-flash.go{animation:flash .2s;}
@keyframes flash{0%{opacity:.95}100%{opacity:0}}

/* objection bubble */
#fx-obj{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:50;pointer-events:none;}
#fx-obj.hidden{display:none;}
#fx-obj .bubble{
  font-size:64px;font-weight:900;font-style:italic;letter-spacing:4px;
  color:#fff;background:var(--pros);padding:18px 34px;border-radius:14px;
  border:5px solid #fff;box-shadow:0 0 0 5px var(--pros),0 18px 40px rgba(0,0,0,.6);
  transform:rotate(-7deg);animation:slam .5s cubic-bezier(.2,2.2,.4,1);
  text-shadow:3px 3px 0 rgba(0,0,0,.35);}
#fx-obj.blue .bubble{background:var(--defense);box-shadow:0 0 0 5px var(--defense),0 18px 40px rgba(0,0,0,.6);}
@keyframes slam{0%{transform:scale(2.4) rotate(-7deg);opacity:0}60%{transform:scale(.92) rotate(-7deg);opacity:1}100%{transform:scale(1) rotate(-7deg)}}

/* testimony banner */
#t-banner{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:25;
  font-size:13px;letter-spacing:3px;color:var(--testi);background:rgba(0,0,0,.55);
  border:1px solid rgba(126,224,138,.5);border-radius:20px;padding:6px 16px;white-space:nowrap;}
#t-banner.hidden{display:none;}
#t-count{color:#bfe8c5;font-size:11px;margin-left:6px;}

/* testimony controls */
#t-controls{display:flex;gap:8px;padding:8px 10px;z-index:30;background:linear-gradient(180deg,transparent,rgba(0,0,0,.3));}
#t-controls.hidden{display:none;}
#t-controls button{flex:1;padding:13px 0;border-radius:8px;font-size:15px;font-weight:900;letter-spacing:2px;
  border:1px solid rgba(255,255,255,.15);box-shadow:0 3px 0 rgba(0,0,0,.45);color:#fff;}
#t-controls button:active{transform:translateY(2px);box-shadow:none;}
#t-prev,#t-next{flex:0 0 56px;background:#3a3a44;font-size:17px;}
#t-press{background:linear-gradient(180deg,#3f8f55,#2e6e40);}
#t-present{background:linear-gradient(180deg,#d05050,#a93636);}

/* dialog box */
#dialog{position:relative;min-height:152px;margin:0 8px 8px;border-radius:10px;
  background:linear-gradient(180deg,var(--paper),var(--paper2));
  border:2px solid #5c4322;box-shadow:0 -6px 18px rgba(0,0,0,.45),inset 0 0 0 1px rgba(255,255,255,.4);
  padding:30px 16px 26px;color:#2a1d10;z-index:20;}
#dialog::before,#dialog::after{content:"";position:absolute;width:9px;height:9px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,var(--gold2),#7a5a1d);top:8px;}
#dialog::before{left:9px}#dialog::after{right:9px}
#nameplate{position:absolute;top:-14px;left:14px;background:linear-gradient(180deg,#3b3b46,#23232c);
  color:#fff;font-size:13.5px;font-weight:900;letter-spacing:2px;padding:6px 16px;border-radius:6px;
  border:1px solid rgba(255,255,255,.25);box-shadow:0 3px 8px rgba(0,0,0,.4);}
#nameplate.hidden{display:none;}
#dtext{font-size:16.5px;line-height:1.85;font-weight:500;min-height:90px;letter-spacing:.5px;}
#dtext.testi{color:#1d6b32;font-weight:700;}
#dtext.think{color:#2a5e9c;font-style:italic;}
#dtext.sys{color:#7a5a1d;font-weight:700;}
#cursor{position:absolute;right:14px;bottom:8px;color:#8a5a33;font-size:14px;animation:cur .8s ease-in-out infinite;opacity:0;}
#cursor.on{opacity:1;}
@keyframes cur{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}

/* ---------- overlays ---------- */
.overlay{position:absolute;inset:0;z-index:60;display:flex;flex-direction:column;
  background:rgba(8,6,4,.86);backdrop-filter:blur(3px);}
.overlay.hidden{display:none;}
.ov-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;}
.ov-head h3{font-size:17px;letter-spacing:4px;color:var(--gold2);}
.ov-close{background:none;color:#cdbfa4;font-size:22px;padding:4px 10px;}

/* evidence record */
#ev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 16px 16px;overflow-y:auto;}
.ev-card{background:linear-gradient(135deg,#241a11,#191209);border:1px solid #4a3520;border-radius:10px;
  padding:12px 6px;text-align:center;color:var(--paper);}
.ev-card .ic{font-size:30px;display:block;margin-bottom:6px;}
.ev-card .nm{font-size:12px;font-weight:700;letter-spacing:1px;}
#ev-detail{padding:6px 18px 18px;display:none;flex-direction:column;gap:10px;}
#ev-detail.on{display:flex;}
#ev-detail .big{font-size:46px;text-align:center;}
#ev-detail h4{font-size:18px;font-weight:900;letter-spacing:2px;text-align:center;color:var(--gold2);}
#ev-detail p{font-size:14px;line-height:1.9;color:#e8dcc2;background:rgba(255,255,255,.05);
  border:1px solid #4a3520;border-radius:8px;padding:12px 14px;}
.present-btn{padding:14px 0;border-radius:8px;background:linear-gradient(180deg,#d05050,#a93636);
  color:#fff;font-size:16px;font-weight:900;letter-spacing:6px;box-shadow:0 3px 0 rgba(0,0,0,.4);}
.ghost-btn{padding:12px 0;border-radius:8px;background:#33291c;color:#cdbfa4;font-size:14px;letter-spacing:3px;}

/* choice */
#ov-choice{justify-content:flex-end;background:rgba(8,6,4,.55);}
#choice-box{margin:0 14px 170px;display:flex;flex-direction:column;gap:10px;}
#choice-prompt{text-align:center;color:var(--gold2);font-size:14px;letter-spacing:3px;margin-bottom:4px;text-shadow:0 2px 6px #000;}
.choice-btn{padding:14px 16px;border-radius:8px;font-size:15px;font-weight:700;letter-spacing:1px;
  background:linear-gradient(180deg,#2f4d86,#23355c);color:#fff;border:1px solid rgba(255,255,255,.2);
  box-shadow:0 3px 0 rgba(0,0,0,.45);text-align:center;}
.choice-btn:active{transform:translateY(2px);box-shadow:none;}
.choice-btn.dim{opacity:.4;}

/* toast (evidence get) */
#ov-toast{align-items:center;justify-content:center;background:rgba(8,6,4,.7);}
#toast-card{width:78%;max-width:340px;background:linear-gradient(135deg,#2a1f12,#1b1309);
  border:2px solid var(--gold);border-radius:12px;padding:20px;text-align:center;
  box-shadow:0 0 30px rgba(217,164,65,.25);animation:pop .35s cubic-bezier(.2,1.6,.4,1);}
#toast-card .lab{font-size:12px;letter-spacing:4px;color:var(--gold);}
#toast-card .ic{font-size:44px;margin:10px 0;}
#toast-card .nm{font-size:19px;font-weight:900;letter-spacing:2px;}
#toast-card .ds{font-size:12.5px;line-height:1.8;color:#cdbfa4;margin-top:8px;}
#toast-card .tap{margin-top:12px;font-size:11px;color:#9c8c70;letter-spacing:2px;}
@keyframes pop{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}

/* chapter title card */
#ov-title{align-items:center;justify-content:center;background:#000;text-align:center;gap:14px;}
#ov-title .ep{font-size:14px;letter-spacing:8px;color:var(--gold);}
#ov-title h2{font-size:34px;font-weight:900;letter-spacing:6px;color:var(--paper);}
#ov-title .rule{width:140px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
#ov-title .tap{font-size:11px;color:#777;letter-spacing:3px;margin-top:18px;}

/* verdict stamp */
#ov-verdict{align-items:center;justify-content:center;background:rgba(8,6,4,.8);}
#stamp{font-size:84px;font-weight:900;letter-spacing:14px;color:var(--gold2);padding:18px 30px 18px 44px;
  border:7px solid var(--gold2);border-radius:14px;transform:rotate(-9deg);
  text-shadow:0 0 26px rgba(240,196,105,.5);box-shadow:0 0 0 3px rgba(240,196,105,.3),0 0 60px rgba(240,196,105,.3);
  animation:stampin .55s cubic-bezier(.3,2,.4,1);background:rgba(0,0,0,.35);}
#stamp.guilty{color:#ff6b5e;border-color:#ff6b5e;text-shadow:0 0 26px rgba(255,107,94,.5);box-shadow:0 0 0 3px rgba(255,107,94,.3),0 0 60px rgba(255,107,94,.3);}
@keyframes stampin{0%{transform:scale(3) rotate(-9deg);opacity:0}60%{transform:scale(.9) rotate(-9deg);opacity:1}100%{transform:scale(1) rotate(-9deg)}}
.spark{position:absolute;font-size:22px;animation:spark 1.4s ease-out forwards;}
@keyframes spark{0%{transform:translateY(0) scale(.6);opacity:1}100%{transform:translateY(-90px) scale(1.4);opacity:0}}

/* game over */
#ov-gameover{align-items:center;justify-content:center;gap:16px;background:rgba(10,2,2,.93);text-align:center;}
#ov-gameover h2{font-size:40px;font-weight:900;letter-spacing:6px;color:#ff6b5e;text-shadow:0 0 30px rgba(255,80,60,.4);}
#ov-gameover p{font-size:13.5px;line-height:2;color:#cdbfa4;}

/* settings */
#ov-settings{justify-content:center;align-items:center;}
#set-card{width:84%;max-width:360px;background:#241a11;border:1px solid #4a3520;border-radius:12px;padding:18px;display:flex;flex-direction:column;gap:12px;}
#set-card h3{text-align:center;letter-spacing:5px;color:var(--gold2);font-size:17px;margin-bottom:4px;}
.set-row{display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.25);border-radius:8px;padding:12px 14px;}
.set-row span{font-size:14px;letter-spacing:2px;}
.set-row button{background:#3b2d1b;border:1px solid #5a472c;color:var(--gold2);border-radius:6px;padding:8px 16px;font-size:13px;font-weight:700;min-width:74px;}

/* ending */
#scr-end{background:radial-gradient(120% 70% at 50% 0%, #2a2017 0%, #15100c 60%);align-items:center;justify-content:center;text-align:center;padding:24px;overflow-y:auto;}
#end-inner{display:flex;flex-direction:column;gap:14px;align-items:center;}
#scr-end h2{font-size:30px;font-weight:900;letter-spacing:6px;color:var(--gold2);}
#scr-end p{font-size:13.5px;line-height:2.1;color:#dccfb2;}
.credits{font-size:12px;line-height:2.4;color:#9c8c70;letter-spacing:2px;}

/* rain fx */
#fx-rain{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .6s;z-index:5;
  background:repeating-linear-gradient(108deg,rgba(190,210,255,.16) 0 1px,transparent 1px 26px);
  background-size:200% 200%;animation:rain .5s linear infinite;}
#fx-rain.on{opacity:1;}
@keyframes rain{0%{background-position:0 0}100%{background-position:-60px 110px}}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01s !important;animation-iteration-count:1 !important;transition-duration:.01s !important;}
}
@media (min-height:760px){#dtext{font-size:17.5px;}#dialog{min-height:168px;}}

</style>
</head>
<body>
<div id="app">

  <!-- ===== 標題畫面 ===== -->
  <section id="scr-title" class="screen on">
    <div class="scale">⚖️</div>
    <h1>逆轉律師</h1>
    <div class="sub">— 台灣法庭推理 —</div>
    <div class="rule"></div>
    <button id="btn-start" class="menu-btn">開 始 辯 護</button>
    <div class="tiny">建議直式持機・點擊畫面開啟音效</div>
  </section>

  <!-- ===== 選關畫面 ===== -->
  <section id="scr-select" class="screen">
    <h2>— 案 件 選 擇 —</h2>
    <div id="case-list"></div>
    <button id="btn-back-title" class="back-btn">← 返回標題</button>
  </section>

  <!-- ===== 遊戲畫面 ===== -->
  <section id="scr-game" class="screen">
    <div id="scene">
      <div id="bg"></div>
      <div id="sprite"></div>
      <div id="fx-rain"></div>
      <div id="t-banner" class="hidden"></div>
      <div id="hud">
        <button id="btn-record" class="hud-btn">🗂 證物</button>
        <div id="penalty"></div>
        <button id="btn-settings" class="hud-btn">⚙</button>
      </div>
      <div id="fx-flash"></div>
      <div id="fx-obj" class="hidden"><div class="bubble"><span>異議！！</span></div></div>
    </div>
    <div id="t-controls" class="hidden">
      <button id="t-prev">◀</button>
      <button id="t-press">等一下</button>
      <button id="t-present">出示證物</button>
      <button id="t-next">▶</button>
    </div>
    <div id="dialog">
      <div id="nameplate" class="hidden"></div>
      <div id="dtext"></div>
      <div id="cursor">▼</div>
    </div>

    <!-- ===== 證物欄 ===== -->
    <div id="ov-record" class="overlay hidden">
      <div class="ov-head"><h3>證物一覽</h3><button class="ov-close">✕</button></div>
      <div id="ev-grid"></div>
      <div id="ev-detail"></div>
    </div>

    <!-- ===== 設定 ===== -->
    <div id="ov-settings" class="overlay hidden">
      <div id="set-card">
        <div class="ov-head"><h3>設　定</h3><button id="ov-settings-close" class="ov-close">✕</button></div>
        <div class="set-row"><span>背景音樂</span><button id="set-bgm">開啟</button></div>
        <div class="set-row"><span>音效</span><button id="set-sfx">開啟</button></div>
        <div class="set-row"><span>文字速度</span><button id="set-speed">慢</button></div>
        <div class="set-row"><span>章節</span><button id="set-unlock">全部解鎖</button></div>
        <div class="set-row"><span>放棄本案</span><button id="set-quit">回標題</button></div>
      </div>
    </div>

    <!-- ===== 選項 ===== -->
    <div id="ov-choice" class="overlay hidden">
      <div id="choice-box"><div id="choice-prompt"></div></div>
    </div>

    <!-- ===== 取得證物 ===== -->
    <div id="ov-toast" class="overlay hidden"><div id="toast-card"></div></div>

    <!-- ===== 章節標題卡 ===== -->
    <div id="ov-title" class="overlay hidden"></div>

    <!-- ===== 判決印章 ===== -->
    <div id="ov-verdict" class="overlay hidden"><div id="stamp">無罪</div></div>

    <!-- ===== 辯護失敗 ===== -->
    <div id="ov-gameover" class="overlay hidden">
      <div style="font-size:50px">⚖️</div>
      <h2>辯 護 失 敗</h2>
      <p>法庭對辯方失去了信任……<br>但真相，值得再試一次。</p>
      <button id="go-retry" class="menu-btn">重新詰問（罰則回滿）</button>
      <button id="go-title" class="back-btn">回標題畫面</button>
    </div>
  </section>

  <!-- ===== 結局畫面 ===== -->
  <section id="scr-end" class="screen">
    <div id="end-inner"></div>
    <button id="btn-end-title" class="menu-btn">回到標題</button>
  </section>

</div>
<script>
/* ===== sprites.js : parametric SVG avatars & backgrounds ===== */

function _hair(style, c){
  switch(style){
    case 'spiky': return `<path d="M48 78 Q44 30 70 28 L66 14 80 26 88 8 96 26 108 10 112 28 L128 22 Q156 32 152 78 Q150 52 128 46 L120 56 108 44 96 56 84 44 72 56 Q52 50 48 78 Z" fill="${c}"/>`;
    case 'part': return `<path d="M48 80 Q44 28 100 26 Q156 28 152 80 Q150 48 116 46 Q86 46 74 56 Q54 56 48 80 Z" fill="${c}"/>`;
    case 'slick': return `<path d="M46 76 Q42 24 100 22 Q158 24 154 76 Q152 44 100 42 Q48 44 46 76 Z" fill="${c}"/><path d="M46 76 Q48 58 60 52 L56 76 Z" fill="${c}"/>`;
    case 'long': return `<path d="M44 150 Q36 36 100 30 Q164 36 156 150 L138 150 Q146 80 128 58 Q108 50 92 52 Q62 58 60 92 L58 150 Z" fill="${c}"/><path d="M48 78 Q56 50 86 48 L78 60 Q60 62 56 80 Z" fill="${c}"/>`;
    case 'pony': return `<path d="M48 80 Q44 28 100 26 Q156 28 152 80 Q150 46 100 44 Q50 46 48 80 Z" fill="${c}"/><path d="M148 60 Q172 66 166 110 Q160 140 148 146 Q158 110 150 84 Z" fill="${c}"/>`;
    case 'cap': return `<path d="M46 70 Q46 30 100 28 Q154 30 154 70 L46 70 Z" fill="${c}"/><rect x="38" y="64" width="124" height="12" rx="6" fill="${c}" />`;
    case 'old': return `<path d="M46 80 Q46 60 62 54 L60 80 Z" fill="${c}"/><path d="M154 80 Q154 60 138 54 L140 80 Z" fill="${c}"/><path d="M62 50 Q80 34 120 36 L116 46 Q86 44 70 54 Z" fill="${c}" opacity=".9"/>`;
    case 'judgewig': return `<path d="M44 84 Q40 56 60 50 Q56 92 50 104 Q42 96 44 84 Z" fill="${c}"/><path d="M156 84 Q160 56 140 50 Q144 92 150 104 Q158 96 156 84 Z" fill="${c}"/>`;
    case 'shortf': return `<path d="M46 86 Q42 28 100 26 Q158 28 154 86 Q152 50 122 48 L114 60 Q92 48 76 58 Q52 56 46 86 Z" fill="${c}"/>`;
    case 'bowl': return `<path d="M46 72 Q44 28 100 26 Q156 28 154 72 Q154 56 100 54 Q46 56 46 72 Z" fill="${c}"/>`;
    default: return '';
  }
}

function _face(exp, opt){
  const e = [];
  // brows
  if(exp==='angry') e.push(`<path d="M66 80 L92 90" stroke="#332" stroke-width="5" stroke-linecap="round"/><path d="M134 80 L108 90" stroke="#332" stroke-width="5" stroke-linecap="round"/>`);
  else if(exp==='sad') e.push(`<path d="M66 88 L92 80" stroke="#332" stroke-width="4.5" stroke-linecap="round"/><path d="M134 88 L108 80" stroke="#332" stroke-width="4.5" stroke-linecap="round"/>`);
  else if(exp==='shock') e.push(`<path d="M66 74 L92 72" stroke="#332" stroke-width="4.5" stroke-linecap="round"/><path d="M134 74 L108 72" stroke="#332" stroke-width="4.5" stroke-linecap="round"/>`);
  else if(exp==='smug') e.push(`<path d="M66 80 L92 86" stroke="#332" stroke-width="4.5" stroke-linecap="round"/><path d="M134 76 L108 80" stroke="#332" stroke-width="4.5" stroke-linecap="round"/>`);
  else e.push(`<path d="M68 82 L90 82" stroke="#332" stroke-width="4.5" stroke-linecap="round"/><path d="M132 82 L110 82" stroke="#332" stroke-width="4.5" stroke-linecap="round"/>`);
  // eyes
  if(exp==='shock') e.push(`<circle cx="79" cy="98" r="9" fill="#fff" stroke="#332" stroke-width="2.5"/><circle cx="121" cy="98" r="9" fill="#fff" stroke="#332" stroke-width="2.5"/><circle cx="79" cy="98" r="3" fill="#332"/><circle cx="121" cy="98" r="3" fill="#332"/>`);
  else if(exp==='smile'||exp==='laugh') e.push(`<path d="M71 98 Q79 90 87 98" stroke="#332" stroke-width="4" fill="none" stroke-linecap="round"/><path d="M113 98 Q121 90 129 98" stroke="#332" stroke-width="4" fill="none" stroke-linecap="round"/>`);
  else if(exp==='smug') e.push(`<path d="M71 96 L87 96" stroke="#332" stroke-width="4.5" stroke-linecap="round"/><path d="M113 96 L129 96" stroke="#332" stroke-width="4.5" stroke-linecap="round"/>`);
  else e.push(`<circle cx="79" cy="97" r="4.6" fill="#332"/><circle cx="121" cy="97" r="4.6" fill="#332"/>`);
  // mouths (closed + open variants for talk animation)
  let mc, mo;
  if(exp==='angry'){ mc=`<path d="M86 128 Q100 120 114 128" stroke="#8a3324" stroke-width="4.5" fill="none" stroke-linecap="round"/>`; mo=`<path d="M84 122 Q100 118 116 122 Q112 140 100 140 Q88 140 84 122 Z" fill="#7d2d20"/>`; }
  else if(exp==='sad'){ mc=`<path d="M88 130 Q100 122 112 130" stroke="#8a3324" stroke-width="4" fill="none" stroke-linecap="round"/>`; mo=`<ellipse cx="100" cy="129" rx="9" ry="7" fill="#7d2d20"/>`; }
  else if(exp==='shock'){ mc=`<ellipse cx="100" cy="129" rx="8" ry="6" fill="#7d2d20"/>`; mo=`<ellipse cx="100" cy="131" rx="12" ry="12" fill="#7d2d20"/>`; }
  else if(exp==='smile'||exp==='laugh'){ mc=`<path d="M84 124 Q100 136 116 124" stroke="#8a3324" stroke-width="4.5" fill="none" stroke-linecap="round"/>`; mo=`<path d="M82 122 Q100 124 118 122 Q114 142 100 142 Q86 142 82 122 Z" fill="#7d2d20"/>`; }
  else if(exp==='smug'){ mc=`<path d="M88 126 Q102 132 114 122" stroke="#8a3324" stroke-width="4" fill="none" stroke-linecap="round"/>`; mo=`<path d="M86 124 Q102 130 116 122 Q110 138 98 138 Q90 134 86 124 Z" fill="#7d2d20"/>`; }
  else { mc=`<path d="M90 127 L110 127" stroke="#8a3324" stroke-width="4" stroke-linecap="round"/>`; mo=`<ellipse cx="100" cy="129" rx="10" ry="8" fill="#7d2d20"/>`; }
  e.push(`<g class="mouth-closed">${mc}</g><g class="mouth-open">${mo}</g>`);
  // sweat
  if(opt && opt.sweat) e.push(`<path d="M146 70 Q154 84 146 90 Q138 84 146 70 Z" fill="#7fb8f0" stroke="#4a86c8" stroke-width="1.5"/>`);
  if(exp==='angry') e.push(`<path d="M140 56 L150 50 M142 64 L154 62 M136 50 L144 40" stroke="#c0392b" stroke-width="3" stroke-linecap="round"/>`);
  return e.join('');
}

function makeAvatar(cfg){
  return function(pose){
    pose = pose || 'normal';
    const sweat = pose === 'sweat' || pose === 'nervous';
    const exp = sweat ? (pose==='nervous' ? 'sad' : 'normal') : pose;
    const skin = cfg.skin || '#f2c9a0';
    const w = cfg.wide ? 14 : 0;
    const parts = [];
    // body / clothes
    parts.push(`<path d="M${44-w} 260 L${48-w} 196 Q${56-w} 172 84 166 L100 162 L116 166 Q${144+w} 172 ${152+w} 196 L${156+w} 260 Z" fill="${cfg.suit}"/>`);
    if(cfg.shirt) parts.push(`<path d="M84 166 L100 200 L116 166 L108 164 L100 176 L92 164 Z" fill="${cfg.shirt}"/>`);
    if(cfg.tie) parts.push(`<path d="M96 172 L104 172 L106 188 L100 224 L94 188 Z" fill="${cfg.tie}"/>`);
    if(cfg.collar) parts.push(`<path d="M70 172 L130 172 L126 186 L74 186 Z" fill="${cfg.collar}"/>`);
    if(cfg.apron) parts.push(`<path d="M72 188 L128 188 L132 260 L68 260 Z" fill="${cfg.apron}"/><path d="M84 188 L84 176 L116 176 L116 188" stroke="${cfg.apron}" stroke-width="7" fill="none"/>`);
    if(cfg.badge) parts.push(`<circle cx="68" cy="196" r="7" fill="#f0c469" stroke="#7a5a1d" stroke-width="2"/>`);
    if(cfg.scarf) parts.push(`<path d="M78 168 Q100 184 122 168 L120 182 Q100 196 80 182 Z" fill="${cfg.scarf}"/>`);
    // neck & head
    parts.push(`<rect x="88" y="138" width="24" height="32" rx="8" fill="${skin}"/>`);
    parts.push(`<ellipse cx="100" cy="92" rx="54" ry="58" fill="${skin}"/>`);
    parts.push(`<ellipse cx="46" cy="96" rx="8" ry="11" fill="${skin}"/><ellipse cx="154" cy="96" rx="8" ry="11" fill="${skin}"/>`);
    // hair behind handled in style; front:
    parts.push(_hair(cfg.hair, cfg.hairC || '#2b2018'));
    // face
    parts.push(_face(exp, {sweat}));
    // accessories
    if(cfg.glasses) parts.push(`<rect x="64" y="86" width="32" height="22" rx="8" fill="rgba(180,220,255,.25)" stroke="#3a3a44" stroke-width="3.5"/><rect x="104" y="86" width="32" height="22" rx="8" fill="rgba(180,220,255,.25)" stroke="#3a3a44" stroke-width="3.5"/><path d="M96 96 L104 96" stroke="#3a3a44" stroke-width="3.5"/>`);
    if(cfg.beard) parts.push(`<path d="M58 110 Q60 162 100 166 Q140 162 142 110 Q142 146 100 150 Q58 146 58 110 Z" fill="${cfg.beard}"/>`);
    if(cfg.stache) parts.push(`<path d="M78 116 Q100 110 122 116 Q112 122 100 121 Q88 122 78 116 Z" fill="${cfg.stache}"/>`);
    if(cfg.wrinkle) parts.push(`<path d="M66 70 Q100 62 134 70" stroke="rgba(0,0,0,.18)" stroke-width="2.5" fill="none"/><path d="M70 116 Q76 120 80 118 M130 116 Q124 120 120 118" stroke="rgba(0,0,0,.18)" stroke-width="2.5" fill="none"/>`);
    if(cfg.capPeak) parts.push(`<path d="M36 66 L100 60 L164 66 L160 78 L40 78 Z" fill="${cfg.capPeak}"/>`);
    if(cfg.gavel) parts.push(`<g transform="translate(146,206) rotate(-24)"><rect x="-6" y="0" width="12" height="44" rx="5" fill="#8a5a33"/><rect x="-24" y="-18" width="48" height="22" rx="8" fill="#6f4526"/></g>`);
    return `<svg viewBox="0 0 200 264" xmlns="http://www.w3.org/2000/svg">${parts.join('')}</svg>`;
  };
}

/* ===== backgrounds ===== */
function _bgWrap(inner, css){
  return `<div style="position:absolute;inset:0;${css}">${inner}</div>`;
}
const BGS = {
  court: _bgWrap(`<svg viewBox="0 0 400 600" preserveAspectRatio="xMidYMax slice" style="width:100%;height:100%">
    <rect width="400" height="600" fill="#3a2817"/>
    <rect y="0" width="400" height="340" fill="#4a3420"/>
    <rect x="30" y="40" width="340" height="260" rx="8" fill="#5c4226"/>
    <circle cx="200" cy="150" r="84" fill="#6f5430" stroke="#d9a441" stroke-width="5"/>

/* ===== audio.js : Web Audio SFX + chiptune sequencer ===== */
const AudioSys = (() => {
  let ctx = null, master = null, sfxBus = null, bgmBus = null;
  let ok = false;
  let bgmOn = true, sfxOn = true;
  let seqTimer = null, curTrack = null, nextNoteTime = 0, stepIdx = 0;

  function init(){
    if(ok || ctx) return;
    try{
      const AC = window.AudioContext || window.webkitAudioContext;
      if(!AC) return;
      ctx = new AC();
      master = ctx.createGain(); master.gain.value = 0.9; master.connect(ctx.destination);
      sfxBus = ctx.createGain(); sfxBus.gain.value = 1; sfxBus.connect(master);
      bgmBus = ctx.createGain(); bgmBus.gain.value = 0.55; bgmBus.connect(master);
      ok = true;
    }catch(e){ ok = false; }
  }
  function resume(){ init(); if(ok && ctx.state === 'suspended') ctx.resume().catch(()=>{}); }

  const mtof = m => 440 * Math.pow(2, (m - 69) / 12);

  function tone(freq, t0, dur, type, vol, bus, slide){
    if(!ok) return;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t0);
    if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(slide,1), t0 + dur);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol, t0 + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(bus);
    o.start(t0); o.stop(t0 + dur + 0.02);
  }
  function noise(t0, dur, vol, bus, lp){
    if(!ok) return;
    const len = Math.max(1, Math.floor(ctx.sampleRate * dur));
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i] = (Math.random()*2-1) * (1 - i/len);
    const s = ctx.createBufferSource(); s.buffer = buf;
    const g = ctx.createGain(); g.gain.value = vol;
    if(lp){ const f = ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value = lp; s.connect(f); f.connect(g); }
    else s.connect(g);
    g.connect(bus); s.start(t0);
  }

  /* ---- SFX ---- */
  const SFX = {
    blip(voice){
      if(!ok || !sfxOn) return;
      const t = ctx.currentTime;
      const f = voice === 'f' ? 540 : voice === 'lo' ? 220 : 330;
      tone(f, t, 0.045, 'square', 0.045, sfxBus);
    },
    gavel(){
      if(!ok || !sfxOn) return;
      const t = ctx.currentTime;
      noise(t, 0.10, 0.5, sfxBus, 900);
      tone(140, t, 0.12, 'sine', 0.4, sfxBus, 60);
      noise(t+0.16, 0.10, 0.4, sfxBus, 900);
      tone(140, t+0.16, 0.12, 'sine', 0.35, sfxBus, 60);
    },
    sting(){
      if(!ok || !sfxOn) return;
      const t = ctx.currentTime;
      [[60,0],[64,0.06],[67,0.12],[72,0.18]].forEach(([m,d])=>{
        tone(mtof(m), t+d, 0.32, 'sawtooth', 0.14, sfxBus);
        tone(mtof(m)*2, t+d, 0.32, 'square', 0.05, sfxBus);
      });
      noise(t, 0.25, 0.18, sfxBus, 3000);
    },
    correct(){
      if(!ok || !sfxOn) return;
      const t = ctx.currentTime;
      [[72,0],[76,0.09],[79,0.18],[84,0.27]].forEach(([m,d])=>{
        tone(mtof(m), t+d, 0.22, 'square', 0.09, sfxBus);
        tone(mtof(m-12), t+d, 0.22, 'triangle', 0.09, sfxBus);
      });
    },
    wrong(){

  function schedule(){
    if(!ok || !curTrack) return;
    const tr = TRACKS[curTrack];
    const spb = 60 / tr.bpm / 2; // 8th notes
    while(nextNoteTime < ctx.currentTime + 0.14){
      const i = stepIdx % tr.mel.length;
      if(bgmOn){
        if(tr.mel[i]) tone(mtof(tr.mel[i]), nextNoteTime, spb*0.9, tr.lead, tr.lv, bgmBus);
        if(tr.bas[i]) tone(mtof(tr.bas[i]), nextNoteTime, spb*0.95, 'triangle', 0.10, bgmBus);
        if(tr.hat[i]) noise(nextNoteTime, 0.03, 0.05, bgmBus, 9000);
      }
      nextNoteTime += spb;
      stepIdx++;
    }
  }
  function playBGM(name){
    if(curTrack === name) return;
    stopBGM();
    if(!name) return;
    curTrack = name;
    if(!ok) return;
    stepIdx = 0; nextNoteTime = ctx.currentTime + 0.06;
    seqTimer = setInterval(schedule, 50);
  }
  function stopBGM(){
    curTrack = null;
    if(seqTimer){ clearInterval(seqTimer); seqTimer = null; }
  }

  return {
    init, resume, sfx: SFX, playBGM, stopBGM,
    setBGM(v){ bgmOn = v; if(!v && ok) {} },
    setSFX(v){ sfxOn = v; },
    get bgmOn(){ return bgmOn; }, get sfxOn(){ return sfxOn; },
    get current(){ return curTrack; }
  };
})();

/* ===== 案件登錄 ===== */
const CASES = [CASE1, CASE2, CASE3, CASE4, CASE5, CASE6, CASE7];

/* ===== engine.js : script runner, testimony system, UI ===== */
const $ = id => document.getElementById(id);

const G = {
  screen:'title', caseIdx:-1, kase:null,
  frames:[], cont:null,
  mode:'script', testimony:null, tIdx:0, inSub:false, penaltyPending:false,
  typing:false, typeTimer:null,
  penalties:5, wrongs:[0,0,0],
  ev:[], curSprite:null,
  unlocked:1, done:CASES.map(()=>false), stars:CASES.map(()=>false),
  settings:{tspeed:1},
  presentMode:false
};

/* ---------- progress persistence (localStorage) ---------- */
const SAVE_KEY = 'gyakuten_save_v1';
function saveProgress(){
  try{
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      v:1,
      unlocked: G.unlocked,
      done: G.done,
      stars: G.stars,
      tspeed: G.settings.tspeed,
      bgm: AudioSys.bgmOn,
      sfx: AudioSys.sfxOn
    }));
  }catch(e){ /* localStorage 不可用（如無痕模式）時靜默忽略 */ }
}
function loadProgress(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return;
    const s = JSON.parse(raw);
    if(typeof s.unlocked === 'number') G.unlocked = Math.min(CASES.length, Math.max(1, s.unlocked | 0));
    if(Array.isArray(s.done))  CASES.forEach((_, i) => { G.done[i]  = !!s.done[i];  });
    if(Array.isArray(s.stars)) CASES.forEach((_, i) => { G.stars[i] = !!s.stars[i]; });
    if(typeof s.tspeed === 'number') G.settings.tspeed = s.tspeed;
    if(typeof s.bgm === 'boolean') AudioSys.setBGM(s.bgm);
    if(typeof s.sfx === 'boolean') AudioSys.setSFX(s.sfx);
    // 已解鎖的章節，至少要與已通關的進度一致
    G.done.forEach((d, i) => { if(d) G.unlocked = Math.max(G.unlocked, i + 2); });
    G.unlocked = Math.min(G.unlocked, CASES.length);
  }catch(e){ /* 存檔毀損時忽略，使用預設值 */ }
}

/* ---------- helpers ---------- */
function showScreen(name){
  G.screen = name;
  ['title','select','game','end'].forEach(s => $('scr-'+s).classList.toggle('on', s===name));
}
function setBG(id){ $('bg').innerHTML = BGS[id] || ''; }
function setRain(on){ $('fx-rain').classList.toggle('on', !!on); }
function setSprite(id, pose){
  G.curSprite = id;
  const sp = $('sprite');
  if(!id){ sp.innerHTML=''; return; }
  sp.innerHTML = CHARS[id].av(pose || 'normal');
  sp.classList.add('bob');
}
function flashFX(){ const f=$('fx-flash'); f.classList.remove('go'); void f.offsetWidth; f.classList.add('go'); }
function shakeFX(){ const s=$('scene'); s.classList.remove('shake'); void s.offsetWidth; s.classList.add('shake'); }
function renderPenalty(){
  $('penalty').innerHTML = Array.from({length:5}, (_,i) =>
    `<span class="p ${i < 5-G.penalties ? 'lost':''}">❗</span>`).join('');
}
function evData(id){ return G.kase.evidence.find(e => e.id===id); }

/* ---------- typewriter ---------- */
let typeFull='', typeShown=0, typeVoice=null;
function setText(text, opts){
  opts = opts || {};
  const np = $('nameplate'), dt = $('dtext');
  if(opts.plate){
    np.classList.remove('hidden');
    np.textContent = opts.plate;
    np.style.background = opts.color ? `linear-gradient(180deg, ${opts.color}, #1c1c24)` : '';
  } else np.classList.add('hidden');
  dt.className = opts.cls || '';
  $('cursor').classList.remove('on');
  clearInterval(G.typeTimer);
  typeFull = text; typeShown = 0; typeVoice = opts.voice || null;
  if(G.settings.tspeed === 0){
    dt.textContent = text; G.typing = false;
    $('cursor').classList.add('on');
    $('sprite').classList.remove('talking');
    return;
  }
  G.typing = true;
  dt.textContent = '';
  if(typeVoice && opts.speakerOnStage) $('sprite').classList.add('talking');
  const iv = G.settings.tspeed === 2 ? 14 : 30;
  G.typeTimer = setInterval(() => {
    typeShown++;
    dt.textContent = typeFull.slice(0, typeShown);
    const ch = typeFull[typeShown-1];
    if(typeVoice && typeShown % 2 === 0 && ch && !'，。！？…—、：「」 '.includes(ch)) AudioSys.sfx.blip(typeVoice);
    if(typeShown >= typeFull.length) finishType();
  }, iv);
}
function finishType(){
  clearInterval(G.typeTimer);
  $('dtext').textContent = typeFull;
  G.typing = false;
  $('cursor').classList.add('on');
  $('sprite').classList.remove('talking');
}

/* ---------- script runner ---------- */
function pushScript(s){ G.frames.push({s, i:0}); }
function step(){
  for(;;){
    const fr = G.frames[G.frames.length-1];
    if(!fr){ afterFrames(); return; }
    if(fr.i >= fr.s.length){ G.frames.pop(); continue; }
    if(exec(fr.s[fr.i], fr)) return;
  }
}
function afterFrames(){
  if(G.mode === 'testimony' && G.testimony){
    if(G.penaltyPending){
      G.penaltyPending = false;
      G.penalties--;
      renderPenalty(); shakeFX(); AudioSys.sfx.thud();
      if(G.penalties <= 0){ openOverlay('ov-gameover'); return; }
    }
    showStatement();
  } else {
    showScreen('select'); renderSelect();
  }
}
function waitTap(){ G.cont = step; return true; }

function exec(e, fr){
  switch(e.t){
    case 'bg': fr.i++; setBG(e.v); return false;
    case 'rain': fr.i++; setRain(e.v); return false;
    case 'sp': fr.i++; setSprite(e.v, e.pose); return false;
    case 'sfx': fr.i++; if(AudioSys.sfx[e.v]) AudioSys.sfx[e.v](); return false;
    case 'bgm': fr.i++; AudioSys.playBGM(e.v || null); return false;
    case 'flash': fr.i++; flashFX(); return false;
    case 'shake': fr.i++; shakeFX(); return false;
    case 'wait': { fr.i++; G.cont = null; setTimeout(step, e.v || 500); return true; }
    case 'say': {
      fr.i++;
      const c = CHARS[e.c];
      if(e.pose) setSprite(e.c, e.pose);
      setText(e.text, {plate: e.name || c.name, color: c.color, voice: c.voice,
        speakerOnStage: G.curSprite === e.c});
      return waitTap();
    }
    case 'think': fr.i++; setText(e.text, {plate:'張律', color:'#2e6fd8', cls:'think'}); return waitTap();
    case 'narr': fr.i++; setText(e.text, {cls:'sys'}); return waitTap();
    case 'obj': {
      fr.i++;
      const box = $('fx-obj');
      box.querySelector('span').textContent = e.word || '異議！！';
      box.classList.toggle('blue', e.c === 'lin' || e.c === 'mei');
      box.classList.remove('hidden');
      AudioSys.sfx.sting(); shakeFX(); flashFX();
      let fired = false;
      const go = () => { if(fired) return; fired = true; box.classList.add('hidden'); step(); };
      G.cont = go;
      setTimeout(go, 1000);
      return true;
    }
    case 'ev': {
      fr.i++;
      if(G.ev.includes(e.v)) return false;
      G.ev.push(e.v);
      const d = evData(e.v);
      $('toast-card').innerHTML = `<div class="lab">— 取得證物 —</div><div class="ic">${d.icon}</div>
        <div class="nm">${d.name}</div><div class="ds">${d.desc}</div><div class="tap">▼ 點擊繼續</div>`;
      AudioSys.sfx.correct();
      openOverlay('ov-toast');
      G.cont = () => { closeOverlays(); step(); };
      return true;
    }
    case 'title': {
      fr.i++;
      $('ov-title').innerHTML = `<div class="ep">${e.ep}</div><div class="rule"></div>
        <h2>${e.name}</h2><div class="rule"></div><div class="tap">▼ 點擊繼續</div>`;
      AudioSys.sfx.swoosh();
      openOverlay('ov-title');
      G.cont = () => { closeOverlays(); step(); };
      return true;
    }
    case 'verdict': {
      fr.i++;
      const st = $('stamp');
      st.textContent = e.v;
      st.classList.toggle('guilty', !!e.guilty);
      openOverlay('ov-verdict');
      AudioSys.sfx.stamp();
      if(!e.guilty) sparkle();
      G.cont = () => { closeOverlays(); step(); };
      return true;
    }
    case 'choice': {
      fr.i++;
      $('choice-prompt').textContent = e.prompt || '';
      const box = $('choice-box');
      box.querySelectorAll('.choice-btn').forEach(b => b.remove());
      e.opts.forEach(opt => {
        const b = document.createElement('button');
        b.className = 'choice-btn'; b.textContent = opt.text;
        b.onclick = ev => { ev.stopPropagation(); AudioSys.resume(); closeOverlays(); if(opt.s) pushScript(opt.s); step(); };
        box.appendChild(b);
      });
      openOverlay('ov-choice');
      G.cont = null;
      return true;
    }
    case 'menu': {
      const remaining = e.opts.filter(o => !(o.once && o._used));
      const onceLeft = e.opts.filter(o => o.once && !o._used);
      if(e.auto && onceLeft.length === 0){ fr.i++; return false; }
      $('choice-prompt').textContent = e.prompt || '要做什麼？';
      const box = $('choice-box');
      box.querySelectorAll('.choice-btn').forEach(b => b.remove());
      remaining.forEach(opt => {
        const b = document.createElement('button');
        b.className = 'choice-btn'; b.textContent = opt.text;
        b.onclick = ev => { ev.stopPropagation(); AudioSys.resume(); closeOverlays(); if(opt.once) opt._used = true; pushScript(opt.s); step(); };
        box.appendChild(b);
      });
      if(e.exit){
        const b = document.createElement('button');
        b.className = 'choice-btn dim'; b.textContent = e.exit;
        b.onclick = ev => { ev.stopPropagation(); AudioSys.resume(); closeOverlays(); fr.i++; step(); };
        box.appendChild(b);
      }
      openOverlay('ov-choice');
      G.cont = null;
      return true;
    }
    case 'addst': {
      fr.i++;
      if(G.testimony){
        G.testimony.statements.splice(e.after + 1, 0, e.st);
      }
      return false;
    }
    case 'testimony': {
      fr.i++;
      enterTestimony(e.v);
      return true;
    }
    case 'end': {
      fr.i++;
      caseComplete();
      return true;
    }
    default: fr.i++; return false;
  }
}

function sparkle(){
  const ov = $('ov-verdict');
  for(let i=0;i<10;i++){
    const s = document.createElement('div');
    s.className = 'spark'; s.textContent = ['✦','✧','★'][i%3];
    s.style.left = (10 + Math.random()*80) + '%';
    s.style.top = (35 + Math.random()*35) + '%';
    s.style.color = '#f0c469';
    s.style.animationDelay = (Math.random()*0.5)+'s';
    ov.appendChild(s);
    setTimeout(() => s.remove(), 2200);
  }
}

/* ---------- testimony ---------- */
function enterTestimony(id){
  G.testimony = G.kase.testimonies[id];
  G.tIdx = 0; G.mode = 'testimony';
  $('ov-title').innerHTML = `<div class="ep">～ 證言 ～</div><div class="rule"></div>
    <h2>${G.testimony.title}</h2><div class="rule"></div><div class="tap">▼ 點擊開始詰問</div>`;
  AudioSys.sfx.swoosh();
  openOverlay('ov-title');
  G.cont = () => { closeOverlays(); showStatement(); };
}
function showStatement(){
  const T = G.testimony;
  const st = T.statements[G.tIdx];
  $('t-banner').classList.remove('hidden');
  $('t-banner').innerHTML = `${T.title}<span id="t-count">${G.tIdx+1} / ${T.statements.length}</span>`;
  $('t-controls').classList.remove('hidden');
  setSprite(T.who, st.pose || 'normal');
  setText(st.text, {plate: CHARS[T.who].name, color: CHARS[T.who].color,
    voice: CHARS[T.who].voice, cls:'testi', speakerOnStage:true});
  G.cont = () => { G.tIdx = (G.tIdx + 1) % T.statements.length; showStatement(); };
}
function hideTestimonyUI(){
  $('t-banner').classList.add('hidden');
  $('t-controls').classList.add('hidden');
}
function navStatement(d){
  if(!G.testimony || G.inSubScript()) return;
  const n = G.testimony.statements.length;
  G.tIdx = (G.tIdx + d + n) % n;
  AudioSys.sfx.swoosh();
  showStatement();
}
function pressStatement(){
  if(!G.testimony) return;
  const st = G.testimony.statements[G.tIdx];
  hideTestimonyUI();
  AudioSys.sfx.sting();
  const obj = [{t:'obj', c:'lin', word:'等一下！！'}];
  pushScript(obj.concat(st.press || DEFAULT_PRESS(G.testimony.who)));
  step();
}
function presentEvidence(id){
  if(!G.testimony) return;
  const st = G.testimony.statements[G.tIdx];
  hideTestimonyUI();
  if(st.ev === id){
    const win = st.win || [];
    G.testimony = null; G.mode = 'script';
    pushScript([{t:'obj', c:'lin'}].concat(win));
  } else {
    G.penaltyPending = true;
    G.wrongs[G.caseIdx]++;
    pushScript(G.testimony.wrong || DEFAULT_WRONG());
  }
  step();
}
G.inSubScript = function(){ return false; };
function DEFAULT_PRESS(who){
  return [
    {t:'say', c:'lin', text:'這句證言……可以請你再說清楚一點嗎？'},
    {t:'sp', v:who, pose:'normal'},
    {t:'say', c:who, text:'我說的就是我看到、聽到的事實。沒什麼好補充的。'},
    {t:'think', text:'（嗯……這裡好像問不出什麼。再檢查其他證言吧。）'}
  ];
}
function DEFAULT_WRONG(){
  return [
    {t:'sfx', v:'wrong'},
    {t:'sp', v:'judge', pose:'angry'},
    {t:'say', c:'judge', text:'辯護人。那項證物……和這句證言有什麼關係？'},
    {t:'sp', v:'yan', pose:'smug'},
    {t:'say', c:'yan', text:'呵呵。看來辯方已經黔驢技窮，開始亂槍打鳥了。'},
    {t:'sp', v:'judge', pose:'angry'},
    {t:'sfx', v:'gavel'},
    {t:'say', c:'judge', text:'請辯護人慎重行事。本庭給予警告！'},
    {t:'think', text:'（糟糕……再亂出示證物的話，委託人就完了。冷靜下來，找出真正的矛盾！）'}
  ];
}

/* ---------- evidence record ---------- */
function openRecord(presentMode){
  G.presentMode = !!presentMode;
  $('ov-record').querySelector('h3').textContent = presentMode ? '要出示哪項證物？' : '證物一覽';
  $('ev-detail').classList.remove('on');
  $('ev-grid').style.display = '';
  const grid = $('ev-grid');
  grid.innerHTML = '';
  G.ev.forEach(id => {
    const d = evData(id);
    const b = document.createElement('button');
    b.className = 'ev-card';
    b.innerHTML = `<span class="ic">${d.icon}</span><span class="nm">${d.name}</span>`;
    b.onclick = ev => { ev.stopPropagation(); AudioSys.resume(); showEvDetail(id); };
    grid.appendChild(b);
  });
  openOverlay('ov-record');
}
function showEvDetail(id){
  const d = evData(id);
  $('ev-grid').style.display = 'none';
  const det = $('ev-detail');
  det.classList.add('on');
  det.innerHTML = `<div class="big">${d.icon}</div><h4>${d.name}</h4><p>${d.desc}</p>`;
  if(G.presentMode){
    const pb = document.createElement('button');
    pb.className = 'present-btn'; pb.textContent = '出示這項證物！';
    pb.onclick = ev => { ev.stopPropagation(); AudioSys.resume(); closeOverlays(); presentEvidence(id); };
    det.appendChild(pb);
  }
  const back = document.createElement('button');
  back.className = 'ghost-btn'; back.textContent = '返回列表';
  back.onclick = ev => { ev.stopPropagation(); openRecord(G.presentMode); };
  det.appendChild(back);
}

/* ---------- overlays ---------- */
const OVERLAYS = ['ov-record','ov-settings','ov-choice','ov-toast','ov-title','ov-verdict','ov-gameover'];
function openOverlay(id){ closeOverlays(); $(id).classList.remove('hidden'); }
function closeOverlays(){ OVERLAYS.forEach(o => $(o).classList.add('hidden')); }
function anyOverlayOpen(){ return OVERLAYS.some(o => !$(o).classList.contains('hidden')); }

/* ---------- case lifecycle ---------- */
function startCase(i){
  G.caseIdx = i;
  G.kase = structuredClone(CASES[i]);
  G.frames = []; G.cont = null;
  G.mode = 'script'; G.testimony = null; G.tIdx = 0;
  G.penalties = 5; G.wrongs[i] = 0; G.penaltyPending = false;
  G.ev = []; G.presentMode = false;
  renderPenalty(); hideTestimonyUI(); closeOverlays();
  setSprite(null); setBG('office'); setRain(false);
  setText('', {});
  showScreen('game');
  pushScript(G.kase.script);
  step();
}
function caseComplete(){
  AudioSys.stopBGM();
  G.done[G.caseIdx] = true;
  if(G.wrongs[G.caseIdx] === 0) G.stars[G.caseIdx] = true;
  G.unlocked = Math.min(CASES.length, Math.max(G.unlocked, G.caseIdx + 2));
  saveProgress();
  hideTestimonyUI();
  if(G.caseIdx === CASES.length - 1) showEnding();
  else { showScreen('select'); renderSelect(); }
}
function retryTestimony(){
  closeOverlays();
  G.penalties = 5;
  renderPenalty();
  G.penaltyPending = false;
  showStatement();
}
function showEnding(){
  const perfect = G.stars.filter(Boolean).length;
  $('end-inner').innerHTML = `
    <div style="font-size:54px">⚖️</div>
    <h2>全案終結</h2>
    <p>${CASES.length} 場法庭風暴。有無罪的歡呼，<br>也有仍在上訴路上的判決。<br>真相不會自己走進法庭——<br>是辯護人把它帶進來的。無論結果如何。</p>
    <p style="color:#f0c469">完美辯護（零失誤）：${perfect} / ${CASES.length} 話<br>${perfect===CASES.length?'★ 傳說中的逆轉律師 ★':'下次挑戰零失誤吧！'}</p>
    <div class="credits">企劃・編劇・程式・美術・音樂<br>Claude<br><br>監製<br>4東<br><br>本作純屬虛構，如有雷同，異議成立。</div>`;
  showScreen('end');
}

/* ---------- select screen ---------- */
function renderSelect(){
  const wrap = $('case-list');
  wrap.innerHTML = '';
  CASES.forEach((c, i) => {
    const locked = i + 1 > G.unlocked;
    const b = document.createElement('button');
    b.className = 'case-card' + (locked ? ' locked' : '');
    b.innerHTML = `<div class="ep">EPISODE ${i+1}</div><h3>${c.title}</h3><p>${c.desc}</p>
      ${G.stars[i] ? '<div class="stars">★ 完美辯護</div>' : ''}
      ${G.done[i] ? '<div class="done-badge">✓ 已結案（可重新挑戰）</div>' : ''}`;
    if(!locked) b.onclick = ev => { ev.stopPropagation(); AudioSys.resume(); startCase(i); };
    wrap.appendChild(b);
  });
}

/* ---------- input ---------- */
function tap(){
  AudioSys.resume();
  if(G.typing){ finishType(); return; }
  if(G.cont){ const f = G.cont; G.cont = null; f(); }
}

/* ---------- settings ---------- */
function renderSettings(){
  $('set-bgm').textContent = AudioSys.bgmOn ? '開啟' : '關閉';
  $('set-sfx').textContent = AudioSys.sfxOn ? '開啟' : '關閉';
  $('set-speed').textContent = G.settings.tspeed === 0 ? '瞬間' : G.settings.tspeed === 2 ? '快' : '慢';
}

/* ---------- boot ---------- */
function boot(){
  loadProgress();
  renderPenalty();
  renderSelect();
  $('btn-start').onclick = () => { AudioSys.resume(); showScreen('select'); renderSelect(); };
  $('btn-back-title').onclick = () => { AudioSys.stopBGM(); showScreen('title'); };
  $('btn-end-title').onclick = () => { AudioSys.stopBGM(); showScreen('title'); };
  $('scene').addEventListener('click', tap);
  $('dialog').addEventListener('click', tap);
  $('ov-toast').addEventListener('click', tap);
  $('ov-title').addEventListener('click', tap);
  $('ov-verdict').addEventListener('click', tap);
  $('t-prev').onclick = e => { e.stopPropagation(); AudioSys.resume(); navStatement(-1); };
  $('t-next').onclick = e => { e.stopPropagation(); AudioSys.resume(); navStatement(1); };
  $('t-press').onclick = e => { e.stopPropagation(); AudioSys.resume(); pressStatement(); };
  $('t-present').onclick = e => { e.stopPropagation(); AudioSys.resume(); openRecord(true); };
  $('btn-record').onclick = e => { e.stopPropagation(); AudioSys.resume(); openRecord(false); };
  $('btn-settings').onclick = e => { e.stopPropagation(); AudioSys.resume(); renderSettings(); openOverlay('ov-settings'); };
  $('ov-record').querySelector('.ov-close').onclick = e => { e.stopPropagation(); closeOverlays(); };
  $('ov-settings-close').onclick = e => { e.stopPropagation(); closeOverlays(); };
  $('set-bgm').onclick = e => { e.stopPropagation(); AudioSys.setBGM(!AudioSys.bgmOn); renderSettings(); saveProgress(); };
  $('set-sfx').onclick = e => { e.stopPropagation(); AudioSys.setSFX(!AudioSys.sfxOn); renderSettings(); saveProgress(); };
  $('set-speed').onclick = e => { e.stopPropagation();
    G.settings.tspeed = G.settings.tspeed === 1 ? 2 : G.settings.tspeed === 2 ? 0 : 1;
    renderSettings(); saveProgress(); };
  $('set-unlock').onclick = e => { e.stopPropagation(); G.unlocked = CASES.length; saveProgress(); renderSelect(); closeOverlays(); showScreen('select'); };
  $('set-quit').onclick = e => { e.stopPropagation(); AudioSys.stopBGM(); closeOverlays(); hideTestimonyUI(); showScreen('title'); };
  $('go-retry').onclick = e => { e.stopPropagation(); retryTestimony(); };
  $('go-title').onclick = e => { e.stopPropagation(); AudioSys.stopBGM(); closeOverlays(); hideTestimonyUI(); showScreen('title'); };
  document.addEventListener('touchstart', () => AudioSys.resume(), {once:true});
  document.addEventListener('click', () => AudioSys.resume(), {once:true});
}
document.addEventListener('DOMContentLoaded', boot);

/* test hooks */
window.Game = { G, tap, navStatement, pressStatement, presentEvidence, startCase,
  showScreen, retryTestimony, closeOverlays, openRecord };

</script>
